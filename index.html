/* ═══════════════════════════ constants & helpers ═══════════════════════════ */

const fmt = n => Number(n || 0).toLocaleString('th-TH');
const f2 = n => Number(n || 0).toFixed(2);

const TH_DAYS = ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'];
const TH_MONTHS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

function thaiDateLabel(dateInput) {
  const d = dateInput instanceof Date ? dateInput : new Date(dateInput + 'T00:00:00');
  if (isNaN(d)) return String(dateInput);
  return `${TH_DAYS[d.getDay()]} ${d.getDate()} ${TH_MONTHS[d.getMonth()]} ${d.getFullYear() + 543}`;
}
function thaiTimeNow() {
  return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
}
function statusOf(item) {
  if (item.qty === 0 || item.qty < item.min * 0.4) return 'critical';
  if (item.qty < item.min) return 'low';
  return 'ok';
}
function todayISO(offsetDays) {
  return new Date(Date.now() + (offsetDays || 0) * 86400000).toISOString().slice(0, 10);
}

const PERSIST_KEYS = ['dark', 'todayMenus', 'orderDate', 'orders', 'vendors', 'stationLogs', 'stock', 'sauces', 'recipes'];

function loadPersisted() {
  const seed = seedData();
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seed;
    const saved = JSON.parse(raw);
    const merged = { ...seed };
    PERSIST_KEYS.forEach(k => { if (saved[k] !== undefined) merged[k] = saved[k]; });
    return merged;
  } catch (e) {
    console.warn('Failed to load saved data, using defaults', e);
    return seed;
  }
}

/* ═══════════════════════════ Toast ═══════════════════════════ */

function Toast({ text }) {
  if (!text) return null;
  return (
    <div style={{ position: 'fixed', bottom: 78, left: '50%', transform: 'translateX(-50%)', background: 'rgba(20,18,30,0.96)', color: '#EDE9DF', padding: '12px 22px', borderRadius: 24, fontFamily: FONT, fontSize: 14, fontWeight: 600, zIndex: 9999, whiteSpace: 'nowrap', boxShadow: '0 6px 24px rgba(0,0,0,0.4)', animation: 'toastSlide 0.2s ease', backdropFilter: 'blur(10px)' }}>

}

  );
}

/* ═══════════════════════════ Dashboard ═══════════════════════════ */

function DashboardPage({ data, setData, notify, goToStock }) {
  const salesByMenu = {};
  data.orders.forEach(o => o.items.forEach(it => {
    salesByMenu[it.menu] = salesByMenu[it.menu] || { qty: 0, amt: 0 };
    salesByMenu[it.menu].qty += it.qty;
    salesByMenu[it.menu].amt += it.qty * it.price;
  }));
  const totalSalesRaw = data.orders.reduce((a, o) => a + o.items.reduce((b, it) => b + it.qty * it.price, 0), 0);
  const totalBoxesRaw = data.orders.reduce((a, o) => a + o.items.reduce((b, it) => b + it.qty, 0), 0);
  const totalCostRaw = Math.round(totalSalesRaw * 0.576);
  const totalProfitRaw = totalSalesRaw - totalCostRaw;
  const yest = 12400;
  const diff = totalSalesRaw - yest;
  const trendPct = yest > 0 ? (diff / yest * 100).toFixed(1) : '0.0';
  const salesTrendColor = diff >= 0 ? '#1A9E5A' : '#D03830';
  const salesTrend = (diff >= 0 ? '+' : '') + trendPct + '%';
  const marginPctRaw = totalSalesRaw > 0 ? Math.round((totalProfitRaw / totalSalesRaw) * 100) : 0;
  const marginColor = marginPctRaw >= 35 ? '#1A9E5A' : marginPctRaw >= 20 ? '#E8920A' : '#D03830';

  const allStatus = data.stock.map(statusOf);
  const critItems = data.stock.filter((_, i) => allStatus[i] === 'critical');
  const lowItems = data.stock.filter((_, i) => allStatus[i] === 'low');
  const hasAlert = critItems.length > 0 || lowItems.length > 0;
  let alertText = '', alertColor = '#E8920A', alertBg = 'rgba(232,146,10,0.1)', alertBorderColor = 'rgba(232,146,10,0.28)';
  if (critItems.length > 0) {
    alertText = `วิกฤต: ${critItems.map(i => i.name).join(', ')} — หมดหรือใกล้หมด`;
    alertColor = '#D03830'; alertBg = 'rgba(208,56,48,0.1)'; alertBorderColor = 'rgba(208,56,48,0.28)';
  } else if (lowItems.length > 0) {
    alertText = `สต๊อกต่ำ: ${lowItems.map(i => i.name).join(', ')}`;
  }

  const topMenus = Object.entries(salesByMenu).sort((a, b) => b[1].amt - a[1].amt).slice(0, 3)
    .map(([name, d], i) => ({ rank: String(i + 1), name, qty: d.qty, amount: fmt(d.amt) }));

  const dashOrders = data.orders.slice().sort((a, b) => b.id - a.id).map(o => {
    const total = o.items.reduce((a2, it) => a2 + it.qty * it.price, 0);
    const summary = o.items.map(it => `${it.menu} x${it.qty}`).join(', ');
    const dObj = new Date(o.date + 'T00:00:00');
    const dateLabel = isNaN(dObj) ? o.date : `${dObj.getDate()}/${dObj.getMonth() + 1}`;
    return { id: o.id, customer: o.customer, summary, total: fmt(total), dateLabel, paid: o.paid };
  });

  const togglePaid = (id) => {
    const wasPaid = data.orders.find(o => o.id === id)?.paid;
    setData(prev => ({ orders: prev.orders.map(x => x.id === id ? { ...x, paid: !x.paid } : x) }));
    notify(wasPaid ? 'ยกเลิกการจ่ายเงินแล้ว' : 'บันทึกการจ่ายเงินแล้ว ✓');
  };

  return (
    <div style={{ animation: 'fadeUp 0.22s ease' }}>
      {hasAlert && (
        <div style={{ background: alertBg, border: `1px solid ${alertBorderColor}`, borderRadius: 14, padding: '11px 14px', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: alertColor, flexShrink: 0, animation: 'blink 1.4s infinite' }} />
          <div style={{ fontSize: 13, fontWeight: 600, color: alertColor, lineHeight: 1.4, flex: 1 }}>{alertText}</div>
          <button type="button" onClick={goToStock} style={{ fontSize: 11, fontWeight: 700, color: alertColor, background: alertColor + '22', border: 'none', borderRadius: 8, padding: '4px 10px', cursor: 'pointer', whiteSpace: 'nowrap' }}>ดูสต๊อก</button>
        </div>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 10 }}>
        <div style={S.card}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>ยอดขายวันนี้</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: 'var(--gold)', lineHeight: 1, fontVariantNumeric: 'tabular-nums' }}>{fmt(totalSalesRaw)}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginTop: 5 }}>
            <span style={{ fontSize: 12, color: 'var(--text-3)' }}>฿</span>
            <span style={{ fontSize: 12, fontWeight: 700, color: salesTrendColor, background: salesTrendColor + '20', borderRadius: 6, padding: '2px 7px' }}>{salesTrend}</span>
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>กล่องที่ขาย</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: 'var(--gold)', lineHeight: 1 }}>{totalBoxesRaw}</div>
          <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 5 }}>กล่อง วันนี้</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
        <div style={S.card}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)', letterSpacing: 0.5, marginBottom: 6 }}>กำไรสุทธิ</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: '#1A9E5A', lineHeight: 1 }}>{fmt(totalProfitRaw)}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 5 }}>
            <span style={{ fontSize: 12, color: 'var(--text-3)' }}>฿</span>
            <span style={{ fontSize: 11, fontWeight: 700, color: marginColor, background: marginColor + '20', borderRadius: 6, padding: '2px 7px' }}>{marginPctRaw}%</span>
          </div>
        </div>
        <div style={S.card}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)', letterSpacing: 0.5, marginBottom: 6 }}>ต้นทุนวัตถุดิบ</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: '#E8920A', lineHeight: 1 }}>{fmt(totalCostRaw)}</div>
          <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 5 }}>฿ วันนี้</div>
        </div>
      </div>

      <div style={{ ...S.card, marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)', marginBottom: 12 }}>เมนูขายดีวันนี้</div>
        {topMenus.length === 0 && <div style={{ fontSize: 13, color: 'var(--text-3)', padding: '8px 0' }}>ยังไม่มีข้อมูลยอดขาย</div>}
        {topMenus.map(tm => (
          <div key={tm.rank + tm.name} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 0', borderBottom: '1px solid var(--divider)' }}>
            <div style={{ width: 26, height: 26, borderRadius: 8, background: 'var(--gold-dim)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 800, color: 'var(--gold)', flexShrink: 0 }}>{tm.rank}</div>
            <div style={{ flex: 1, fontSize: 14, fontWeight: 500, color: 'var(--text-1)' }}>{tm.name}</div>
            <div style={{ textAlign: 'right', flexShrink: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--gold)' }}>฿{tm.amount}</div>
              <div style={{ fontSize: 11, color: 'var(--text-3)' }}>{tm.qty} กล่อง</div>
            </div>
          </div>
        ))}
      </div>

      <div style={S.card}>
        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)', marginBottom: 12 }}>รายการออเดอร์ที่สั่ง</div>
        {dashOrders.map(o => (
          <div key={o.id} style={{ padding: '11px 0', borderBottom: '1px solid var(--divider)' }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 10, marginBottom: 5 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)' }}>{o.customer}</div>
                <div style={{ fontSize: 12, color: 'var(--text-2)', marginTop: 2 }}>{o.summary}</div>
                <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>ส่ง {o.dateLabel}</div>
              </div>
              <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--gold)', whiteSpace: 'nowrap' }}>฿{o.total}</div>
            </div>
            <button type="button" onClick={() => togglePaid(o.id)} style={{ width: '100%', minHeight: 40, borderRadius: 10, border: `1.5px solid ${o.paid ? 'rgba(26,158,90,0.3)' : 'var(--gold)'}`, background: o.paid ? 'rgba(26,158,90,0.12)' : 'var(--gold)', color: o.paid ? '#1A9E5A' : '#111018', fontFamily: FONT, fontSize: 13, fontWeight: 700, cursor: 'pointer', marginTop: 6 }}>
              {o.paid ? 'จ่ายแล้ว ✓' : 'จ่ายเงิน'}
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════ Orders ═══════════════════════════ */

function OrdersPage({ data, setData, notify }) {
  const [oCustomer, setOCustomer] = useState('');
  const [oQtyMap, setOQtyMap] = useState({});

  const todaySet = new Set(data.todayMenus);
  const menuChips = data.recipes.map(r => {
    const active = todaySet.has(r.name);
    const toggle = () => {
      const set = new Set(data.todayMenus);
      if (set.has(r.name)) set.delete(r.name); else set.add(r.name);
      setData({ todayMenus: Array.from(set) });
    };
    return { name: r.name, active, toggle };
  });

  const ordersForDate = data.orders.filter(o => o.date === data.orderDate);

  const menuSummary = data.todayMenus.map(name => {
    let totalQty = 0;
    ordersForDate.forEach(o => o.items.forEach(it => { if (it.menu === name) totalQty += it.qty; }));
    return { shortName: name, totalQty };
  });

  const oMenuItems = data.todayMenus.map(name => {
    const r = data.recipes.find(x => x.name === name);
    const qty = oQtyMap[name] || 0;
    return {
      menu: name, price: r ? r.price : 0, qty,
      inc: () => setOQtyMap(prev => ({ ...prev, [name]: (prev[name] || 0) + 1 })),
      dec: () => setOQtyMap(prev => { const cur = prev[name] || 0; return cur <= 0 ? prev : { ...prev, [name]: cur - 1 }; }),
    };
  });
  const oTotalBoxes = oMenuItems.reduce((a, mi) => a + mi.qty, 0);
  const oTotalAmt = fmt(oMenuItems.reduce((a, mi) => a + mi.qty * mi.price, 0));

  const orderedNamesToday = new Set(ordersForDate.map(o => o.customer));
  const customerChips = data.vendors.filter(v => !orderedNamesToday.has(v.name)).map(v => ({
    name: v.name, active: oCustomer === v.name, select: () => setOCustomer(v.name),
  }));
  const noCustomersLeft = customerChips.length === 0;

  const orderItems = ordersForDate.slice().reverse().map(o => {
    const items = o.items.map(it => ({ menu: it.menu, qty: it.qty, amt: fmt(it.qty * it.price) }));
    const total = fmt(o.items.reduce((a, it) => a + it.qty * it.price, 0));
    const totalBoxes = o.items.reduce((a, it) => a + it.qty, 0);
    return { id: o.id, customer: o.customer, time: o.time, items, total, totalBoxes };
  });
  const orderCount = ordersForDate.length;
  const orderBoxTotal = ordersForDate.reduce((a, o) => a + o.items.reduce((b, it) => b + it.qty, 0), 0);
  const orderDateLabel = thaiDateLabel(data.orderDate);

  const deleteOrder = (id) => {
    setData(prev => ({ orders: prev.orders.filter(x => x.id !== id) }));
    notify('ลบออเดอร์แล้ว');
  };

  const addOrder = () => {
    if (!oCustomer.trim()) { notify('กรุณาระบุชื่อลูกค้า'); return; }
    const entries = data.todayMenus.map(name => {
      const r = data.recipes.find(x => x.name === name);
      return { menu: name, qty: oQtyMap[name] || 0, price: r ? r.price : 0 };
    }).filter(it => it.qty > 0);
    if (entries.length === 0) { notify('กรุณาระบุจำนวนอย่างน้อย 1 เมนู'); return; }
    const custName = oCustomer.trim();
    const newOrd = { id: Date.now(), date: data.orderDate, customer: custName, items: entries, time: thaiTimeNow(), paid: false };
    setData(prev => ({ orders: [...prev.orders, newOrd] }));
    setOCustomer(''); setOQtyMap({});
    notify(`บันทึกออเดอร์ "${custName}" แล้ว ✓`);
  };

  return (
    <div style={{ animation: 'fadeUp 0.22s ease' }}>
      <div style={{ ...S.cardTight, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ flex: 1 }}>
          <label style={S.label}>วันที่ออเดอร์ / ผลิต</label>
          <input type="date" value={data.orderDate} onChange={e => setData({ orderDate: e.target.value })} style={S.inputStrong} />
        </div>
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div style={{ fontSize: 11, color: 'var(--text-3)' }}>แสดงผล</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--gold)', whiteSpace: 'nowrap' }}>{orderDateLabel}</div>
        </div>
      </div>

      <div style={{ ...S.cardTight, marginBottom: 12 }}>
        <div style={S.sectionLabel}>เมนูที่ทำวันนี้ — กดเลือก</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {menuChips.map(chip => (
            <button key={chip.name} type="button" onClick={chip.toggle} style={S.chip(chip.active)}>{chip.name}</button>
          ))}
        </div>
      </div>

      <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 2, marginBottom: 12 }}>
        {menuSummary.map(ms => (
          <div key={ms.shortName} style={{ background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 13, padding: '11px 13px', flexShrink: 0, minWidth: 94 }}>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginBottom: 3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 84 }}>{ms.shortName}</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--gold)', lineHeight: 1.1, fontVariantNumeric: 'tabular-nums' }}>{ms.totalQty}</div>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>กล่อง</div>
          </div>
        ))}
        <div style={{ background: 'var(--gold-dim)', border: '1.5px solid var(--gold-border)', borderRadius: 13, padding: '11px 13px', flexShrink: 0, minWidth: 94 }}>
          <div style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 3 }}>รวมทุกเมนู</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--gold)', lineHeight: 1.1 }}>{oTotalBoxes}</div>
          <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 2 }}>฿{oTotalAmt}</div>
        </div>
      </div>

      <div style={{ ...S.card, marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)', marginBottom: 13 }}>รับออเดอร์จากลูกค้า</div>

        <div style={{ marginBottom: 13 }}>
          <label style={S.label}>เลือกลูกค้า</label>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {customerChips.map(cc => (
              <button key={cc.name} type="button" onClick={cc.select} style={S.chip(cc.active)}>{cc.name}</button>
            ))}
          </div>
          {noCustomersLeft && <div style={{ fontSize: 13, color: 'var(--text-3)', padding: '6px 0' }}>ลูกค้าทั้งหมดสั่งของวันนี้แล้ว</div>}
        </div>

        {oMenuItems.map(mi => (
          <div key={mi.menu} style={{ display: 'flex', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid var(--divider)' }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-1)' }}>{mi.menu}</div>
              <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 1 }}>฿{mi.price} / กล่อง</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
              <button type="button" onClick={mi.dec} style={{ width: 44, height: 44, borderRadius: 12, background: 'var(--input-bg)', border: '1px solid var(--card-border)', color: 'var(--text-2)', fontSize: 26, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', lineHeight: 1 }}>−</button>
              <div style={{ fontSize: 26, fontWeight: 800, color: 'var(--text-1)', minWidth: 36, textAlign: 'center', fontVariantNumeric: 'tabular-nums' }}>{mi.qty}</div>

        <button type="button" onClick={addOrder} style={S.primaryBtn}>บันทึกออเดอร์</button>

      <div style={S.sectionLabel}>รายการวันที่ {orderDateLabel} ({orderCount} ร้าน)</div>

/* ═══════════════════════════ Production ═══════════════════════════ */

const STATION_META = [
  { key: 'soup', label: 'น้ำซุป' },
  { key: 'rice', label: 'หุงข้าว' },
  { key: 'meat', label: 'เนื้อและอื่นๆ' },
];

function ProductionPage({ data, setData, notify }) {
  const [addingStation, setAddingStation] = useState('');
  const [newProdStock, setNewProdStock] = useState('');
  const [newProdQty, setNewProdQty] = useState('');

  const ordersForDate = data.orders.filter(o => o.date === data.orderDate);
  const noOrdersForProdDate = ordersForDate.length === 0;
  const orderDateLabel = thaiDateLabel(data.orderDate);

  const startAdd = (key) => {
    if (noOrdersForProdDate) { notify('ยังไม่มีออเดอร์สำหรับวันที่นี้'); return; }
    setAddingStation(key);
    setNewProdStock(data.stock[0] ? data.stock[0].name : '');
    setNewProdQty('');
  };
  const cancelAdd = () => { setAddingStation(''); setNewProdStock(''); setNewProdQty(''); };
  const saveAdd = (key) => {
    const stockItem = data.stock.find(x => x.name === newProdStock);
    if (!stockItem) { notify('กรุณาเลือกวัตถุดิบ'); return; }
    const q = parseFloat(newProdQty);
    if (!newProdQty || isNaN(q) || q <= 0) { notify('กรุณาระบุปริมาณที่ถูกต้อง'); return; }
    const cost = q * (stockItem.price || 0);
    const insufficient = stockItem.qty < q;
    setData(prev => ({
      stock: prev.stock.map(st => st.name === stockItem.name ? { ...st, qty: Math.max(0, st.qty - q) } : st),
      stationLogs: { ...prev.stationLogs, [key]: [...prev.stationLogs[key], { name: stockItem.name, qty: q, unit: stockItem.unit, cost }] },
    }));
    cancelAdd();
    notify(insufficient ? `บันทึกแล้ว แต่ "${stockItem.name}" ในสต๊อกไม่พอ` : `เพิ่ม "${stockItem.name}" ${q} ${stockItem.unit} แล้ว ✓`);
  };
  const deleteEntry = (key, idx, name) => {
    setData(prev => ({ stationLogs: { ...prev.stationLogs, [key]: prev.stationLogs[key].filter((_, i) => i !== idx) } }));
    notify(`ลบ "${name}" แล้ว`);
  };

  const stations = STATION_META.map(sm => {
    const log = data.stationLogs[sm.key] || [];
    const totalCost = log.reduce((a, en) => a + en.cost, 0);
    return { ...sm, log, totalCost };
  });
  const prodTotalCost = stations.reduce((a, st) => a + st.totalCost, 0);
  const newProdUnit = (data.stock.find(x => x.name === newProdStock) || {}).unit || '-';
  const newProdCostPreview = f2((parseFloat(newProdQty) || 0) * ((data.stock.find(x => x.name === newProdStock) || {}).price || 0));

  return (
    <div style={{ animation: 'fadeUp 0.22s ease' }}>
      <div style={{ ...S.cardTight, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ flex: 1 }}>
          <label style={S.label}>วันที่ผลิต (ตรงกับออเดอร์)</label>
          <input type="date" value={data.orderDate} onChange={e => setData({ orderDate: e.target.value })} style={S.inputStrong} />
        </div>
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div style={{ fontSize: 11, color: 'var(--text-3)' }}>ออเดอร์วันนี้</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--gold)' }}>{ordersForDate.length} ร้าน</div>
        </div>
      </div>

      {noOrdersForProdDate && (
        <div style={{ background: 'rgba(208,56,48,0.1)', border: '1px solid rgba(208,56,48,0.28)', borderRadius: 14, padding: '12px 14px', marginBottom: 12 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#D03830' }}>ยังไม่มีออเดอร์สำหรับวันที่ {orderDateLabel} — ต้องรับออเดอร์ก่อนจึงจะเพิ่มการผลิตได้</div>
        </div>
      )}

      <div style={{ background: 'var(--gold-dim)', border: '1px solid var(--gold-border)', borderRadius: 16, padding: '14px 16px', marginBottom: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)' }}>ต้นทุนการผลิตวันนี้ (รวมทุกส่วน)</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--gold)', lineHeight: 1.2 }}>฿{f2(prodTotalCost)}</div>
        </div>
        <div style={{ fontSize: 12, color: 'var(--text-3)', textAlign: 'right' }}>ผลิตพร้อมกันทั้งหมด<br />แบ่ง 3 ส่วน</div>
      </div>

      {stations.map(st => {
        const adding = addingStation === st.key;
        return (
          <div key={st.key} style={{ background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 16, overflow: 'hidden', marginBottom: 11 }}>
            <div style={{ padding: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-1)' }}>{st.label}</div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: 'var(--text-3)' }}>ต้นทุนรวม</div>
                <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--gold)' }}>฿{f2(st.totalCost)}</div>
              </div>
            </div>

            {st.log.length > 0 && (
              <div style={{ padding: '0 14px' }}>
                {st.log.map((en, ei) => (
                  <div key={ei} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0', borderTop: '1px solid var(--divider)', gap: 8 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--text-1)' }}>{en.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-3)' }}>{en.qty} {en.unit}</div>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-1)', flexShrink: 0 }}>฿{f2(en.cost)}</div>
                    <button type="button" onClick={() => deleteEntry(st.key, ei, en.name)} style={S.deleteBtn}>ลบ</button>
                  </div>
                ))}
              </div>
            )}

            <div style={{ padding: '12px 14px 14px' }}>
              {adding ? (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 7, paddingTop: 8, borderTop: '1px solid var(--divider)' }}>
                  <select value={newProdStock} onChange={e => setNewProdStock(e.target.value)} style={{ ...S.goldInput, cursor: 'pointer' }}>
                    {data.stock.map(so => <option key={so.name} value={so.name}>{`${so.name} (${so.unit}${so.price ? ` · ฿${f2(so.price)}/${so.unit}` : ''})`}</option>)}
                  </select>
                  <input type="number" value={newProdQty} onChange={e => setNewProdQty(e.target.value)} placeholder={`ปริมาณที่ใช้ (${newProdUnit})`} inputMode="decimal" style={S.goldInput} />
                  <div style={{ background: 'var(--gold-dim)', border: '1px solid var(--gold-border)', borderRadius: 10, padding: '9px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div style={{ fontSize: 12, color: 'var(--text-2)' }}>ราคา</div>
                    <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--gold)' }}>฿{newProdCostPreview}</div>
                  </div>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <button type="button" onClick={() => saveAdd(st.key)} style={S.goldSmallBtn}>บันทึก (หักสต๊อก)</button>
                    <button type="button" onClick={cancelAdd} style={S.ghostBtn}>ยกเลิก</button>
                  </div>
                </div>
              ) : (
                <button type="button" onClick={() => startAdd(st.key)} disabled={noOrdersForProdDate} style={{ width: '100%', minHeight: 48, border: `1.5px dashed ${noOrdersForProdDate ? 'var(--card-border)' : 'var(--gold-border)'}`, borderRadius: 10, background: 'transparent', color: noOrdersForProdDate ? 'var(--text-3)' : 'var(--gold)', fontFamily: FONT, fontSize: 13, fontWeight: 700, cursor: noOrdersForProdDate ? 'not-allowed' : 'pointer' }}>+ เพิ่มปริมาณวัตถุดิบที่ใช้</button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════ Stock ═══════════════════════════ */

const UNIT_OPTS = ['กก.', 'กรัม', 'ขวด', 'ลิตร', 'ฟอง', 'ชิ้น', 'ถุง'];

function StockPage({ data, setData, notify }) {
  const [showAddMat, setShowAddMat] = useState(false);
  const [matName, setMatName] = useState(''); const [matQty, setMatQty] = useState('');
  const [matUnit, setMatUnit] = useState('กก.'); const [matPrice, setMatPrice] = useState(''); const [matMin, setMatMin] = useState('');

  const [editIdx, setEditIdx] = useState(-1);
  const [editName, setEditName] = useState(''); const [editQty, setEditQty] = useState('');
  const [editUnit, setEditUnit] = useState('กก.'); const [editMin, setEditMin] = useState(''); const [editPrice, setEditPrice] = useState('');

  const [showAddSauce, setShowAddSauce] = useState(false);
  const [newSauceName, setNewSauceName] = useState('');
  const [sauceExpandIdx, setSauceExpandIdx] = useState(-1);
  const [editSauceIdx, setEditSauceIdx] = useState(-1); const [editSauceName, setEditSauceName] = useState('');
  const [addSauceIngIdx, setAddSauceIngIdx] = useState(-1); const [newSIngStock, setNewSIngStock] = useState(''); const [newSIngQty, setNewSIngQty] = useState('');
  const [addSauceQtyIdx, setAddSauceQtyIdx] = useState(-1); const [newSauceBags, setNewSauceBags] = useState('');

  const matQtyNum = parseFloat(matQty) || 0;
  const matPriceNum = parseFloat(matPrice) || 0;
  const matPerUnit = matQtyNum > 0 ? matPriceNum / matQtyNum : 0;
  const matTotal = matQtyNum > 0 ? `฿${f2(matPerUnit)} / ${matUnit}` : '—';

  const addMaterial = () => {
    if (!matName.trim()) { notify('กรุณาระบุชื่อวัตถุดิบ'); return; }
    const q = parseFloat(matQty);
    if (!matQty || isNaN(q) || q < 0) { notify('กรุณาระบุจำนวนให้ถูกต้อง'); return; }
    const item = { name: matName.trim(), qty: q, unit: matUnit, min: parseFloat(matMin) || 0, price: matPerUnit };
    setData(prev => ({ stock: [...prev.stock, item] }));
    setShowAddMat(false); setMatName(''); setMatQty(''); setMatUnit('กก.'); setMatPrice(''); setMatMin('');
    notify(`เพิ่ม "${item.name}" แล้ว ✓`);
  };

  const startEdit = (i, item) => { setEditIdx(i); setEditName(item.name); setEditQty(String(item.qty)); setEditUnit(item.unit); setEditMin(String(item.min)); setEditPrice(item.price ? String(item.price) : ''); };
  const cancelEdit = () => setEditIdx(-1);
  const saveEdit = (i) => {
    const v = parseFloat(editQty);
    if (!editName.trim()) { notify('กรุณาระบุชื่อวัตถุดิบ'); return; }
    if (isNaN(v) || v < 0) { notify('กรุณาใส่จำนวนที่ถูกต้อง'); return; }
    setData(prev => ({ stock: prev.stock.map((st, idx) => idx === i ? { name: editName.trim(), qty: v, unit: editUnit, min: parseFloat(editMin) || 0, price: parseFloat(editPrice) || 0 } : st) }));
    setEditIdx(-1);
    notify(`อัปเดต "${editName.trim()}" แล้ว ✓`);
  };
  const removeStock = (i, name) => {
    setData(prev => ({ stock: prev.stock.filter((_, idx) => idx !== i) }));
    setEditIdx(-1);
    notify(`ลบ "${name}" แล้ว`);
  };

  const allStatus = data.stock.map(statusOf);
  const critCount = allStatus.filter(x => x === 'critical').length;
  const lowCount = allStatus.filter(x => x === 'low').length;
  const okCount = data.stock.length - critCount - lowCount;

  const addSauce = () => {
    if (!newSauceName.trim()) { notify('กรุณาระบุชื่อน้ำจิ้ม'); return; }
    setData(prev => ({ sauces: [...prev.sauces, { id: Date.now(), name: newSauceName.trim(), stockQty: 0, maxPricePerBag: 0, ings: [] }] }));
    notify(`เพิ่ม "${newSauceName.trim()}" แล้ว ✓`);
    setShowAddSauce(false); setNewSauceName('');
  };

  const startAddSIng = (i) => { setAddSauceIngIdx(i); setNewSIngStock(data.stock[0] ? data.stock[0].name : ''); setNewSIngQty(''); };
  const cancelAddSIng = () => { setAddSauceIngIdx(-1); setNewSIngStock(''); setNewSIngQty(''); };
  const saveSIng = (i) => {
    const stockItem = data.stock.find(x => x.name === newSIngStock);
    if (!stockItem) { notify('กรุณาเลือกวัตถุดิบ'); return; }
    const q = parseFloat(newSIngQty);
    if (!newSIngQty || isNaN(q) || q <= 0) { notify('กรุณาระบุปริมาณที่ถูกต้อง'); return; }
    setData(prev => ({ sauces: prev.sauces.map((sa, idx) => idx === i ? { ...sa, ings: [...sa.ings, { name: stockItem.name, qtyPerRound: q, unit: stockItem.unit }] } : sa) }));
    cancelAddSIng();
    notify(`เพิ่ม "${stockItem.name}" แล้ว ✓`);
  };
  const deleteSIng = (i, ii, name) => {
    setData(prev => ({ sauces: prev.sauces.map((sa, idx) => idx === i ? { ...sa, ings: sa.ings.filter((_, x) => x !== ii) } : sa) }));
    notify(`ลบ "${name}" แล้ว`);
  };
  const startAddSQty = (i) => { setAddSauceQtyIdx(i); setNewSauceBags(''); };
  const cancelAddSQty = () => { setAddSauceQtyIdx(-1); setNewSauceBags(''); };
  const saveSQty = (i) => {
    const bags = parseFloat(newSauceBags);
    if (!newSauceBags || isNaN(bags) || bags <= 0) { notify('กรุณาระบุจำนวนถุงที่ถูกต้อง'); return; }
    const sauce = data.sauces[i];
    let insufficient = [];
    let roundCost = 0;
    const stockCopy = data.stock.map(st => ({ ...st }));
    sauce.ings.forEach(ing => {
      const st = stockCopy.find(x => x.name === ing.name);
      if (st) {
        if (st.qty < ing.qtyPerRound) insufficient.push(ing.name);
        st.qty = Math.max(0, st.qty - ing.qtyPerRound);
        roundCost += ing.qtyPerRound * (st.price || 0);
      }
    });
    const pricePerBag = roundCost / bags;
    setData(prev => ({
      stock: stockCopy,
      sauces: prev.sauces.map((sa, idx) => idx === i ? { ...sa, stockQty: sa.stockQty + bags, maxPricePerBag: Math.max(sa.maxPricePerBag || 0, pricePerBag) } : sa),
    }));
    cancelAddSQty();
    notify(insufficient.length ? `บันทึกแล้ว แต่วัตถุดิบไม่พอ: ${insufficient.join(', ')}` : `ทำ "${sauce.name}" รอบนี้ได้ ${bags} ถุง — ราคาต่อถุง ฿${f2(pricePerBag)} ✓`);
  };
  const startEditSauceName = (i, name, e) => { e.stopPropagation(); setEditSauceIdx(i); setEditSauceName(name); };
  const cancelEditSauceName = () => { setEditSauceIdx(-1); setEditSauceName(''); };
  const saveSauceName = (i) => {
    const nm = editSauceName.trim();
    if (!nm) { notify('กรุณาระบุชื่อน้ำจิ้ม'); return; }
    setData(prev => ({ sauces: prev.sauces.map((sa, idx) => idx === i ? { ...sa, name: nm } : sa) }));
    setEditSauceIdx(-1); setEditSauceName('');
    notify(`อัปเดต "${nm}" แล้ว ✓`);
  };
  const deleteSauce = (i, name) => {
    setData(prev => ({ sauces: prev.sauces.filter((_, idx) => idx !== i) }));
    setEditSauceIdx(-1); setSauceExpandIdx(-1);
    notify(`ลบ "${name}" แล้ว`);
  };

  return (
    <div style={{ animation: 'fadeUp 0.22s ease' }}>
      <button type="button" onClick={() => setShowAddMat(v => !v)} style={S.toggleBtn(showAddMat)}>{showAddMat ? '✕ ปิดฟอร์ม' : '+ เพิ่มวัตถุดิบ'}</button>

      {showAddMat && (
        <div style={{ ...S.card, marginBottom: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)', marginBottom: 13 }}>เพิ่มวัตถุดิบใหม่</div>
          <Field label="ชื่อวัตถุดิบ"><input type="text" value={matName} onChange={e => setMatName(e.target.value)} placeholder="เช่น พริกแห้ง..." style={S.input} /></Field>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 11 }}>
            <Field label="จำนวน"><input type="number" value={matQty} onChange={e => setMatQty(e.target.value)} placeholder="0" inputMode="decimal" style={S.inputStrong} /></Field>
            <Field label="หน่วย">
              <select value={matUnit} onChange={e => setMatUnit(e.target.value)} style={{ ...S.input, cursor: 'pointer' }}>
                {UNIT_OPTS.map(u => <option key={u} value={u}>{u}</option>)}
              </select>
            </Field>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
            <Field label="ราคา (บาท)"><input type="number" value={matPrice} onChange={e => setMatPrice(e.target.value)} placeholder="0" inputMode="decimal" style={S.inputStrong} /></Field>
            <Field label="แจ้งเตือนเมื่อต่ำกว่า"><input type="number" value={matMin} onChange={e => setMatMin(e.target.value)} placeholder="0" inputMode="decimal" style={S.inputStrong} /></Field>
          </div>
          <div style={{ background: 'var(--gold-dim)', border: '1px solid var(--gold-border)', borderRadius: 12, padding: '12px 14px', marginBottom: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-2)' }}>ราคาต่อหน่วย</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--gold)' }}>{matTotal}</div>
          </div>
          <button type="button" onClick={addMaterial} style={S.primaryBtn}>บันทึกวัตถุดิบ</button>
        </div>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 12 }}>
        <div style={{ background: 'rgba(208,56,48,0.1)', border: '1px solid rgba(208,56,48,0.28)', borderRadius: 13, padding: 12, textAlign: 'center' }}>
          <div style={{ fontSize: 24, fontWeight: 800, color: '#D03830', lineHeight: 1 }}>{critCount}</div>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#D03830', marginTop: 3 }}>วิกฤต</div>
        </div>
        <div style={{ background: 'rgba(232,146,10,0.1)', border: '1px solid rgba(232,146,10,0.28)', borderRadius: 13, padding: 12, textAlign: 'center' }}>
          <div style={{ fontSize: 24, fontWeight: 800, color: '#E8920A', lineHeight: 1 }}>{lowCount}</div>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#E8920A', marginTop: 3 }}>ต่ำ</div>
        </div>
        <div style={{ background: 'rgba(26,158,90,0.1)', border: '1px solid rgba(26,158,90,0.28)', borderRadius: 13, padding: 12, textAlign: 'center' }}>
          <div style={{ fontSize: 24, fontWeight: 800, color: '#1A9E5A', lineHeight: 1 }}>{okCount}</div>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#1A9E5A', marginTop: 3 }}>ปกติ</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
        {data.stock.map((item, i) => {
          const st = statusOf(item);
          const sc = st === 'critical' ? '#D03830' : st === 'low' ? '#E8920A' : '#1A9E5A';
          const sb = st === 'critical' ? 'rgba(208,56,48,0.12)' : st === 'low' ? 'rgba(232,146,10,0.12)' : 'rgba(26,158,90,0.12)';
          const border = st === 'critical' ? 'rgba(208,56,48,0.4)' : st === 'low' ? 'rgba(232,146,10,0.32)' : 'var(--card-border)';
          const sl = st === 'critical' ? 'วิกฤต' : st === 'low' ? 'ต่ำ' : 'ปกติ';
          const anim = st === 'critical' ? 'blink 1.2s infinite' : 'none';
          const isEditing = editIdx === i;
          return (
            <div key={item.name + i} style={{ background: 'var(--card-bg)', border: `1.5px solid ${border}`, borderRadius: 14, padding: '13px 12px', display: 'flex', flexDirection: 'column', gap: 7 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: sc, background: sb, borderRadius: 7, padding: '2px 8px' }}>{sl}</div>
                <div style={{ width: 8, height: 8, borderRadius: '50%', background: sc, animation: anim }} />
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-1)', lineHeight: 1.2 }}>{item.name}</div>

              {!isEditing ? (
                <React.Fragment>
                  <div>
                    <div style={{ fontSize: 26, fontWeight: 800, color: sc, lineHeight: 1.1, fontVariantNumeric: 'tabular-nums' }}>{item.qty}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-3)' }}>{item.unit} · min {item.min}</div>
                    {!!item.price && <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 1 }}>ราคาต่อหน่วย ฿{f2(item.price)} / {item.unit}</div>}
                  </div>
                  <button type="button" onClick={() => startEdit(i, item)} style={{ width: '100%', padding: 8, border: '1.5px solid var(--input-border)', borderRadius: 10, background: 'transparent', color: 'var(--text-2)', fontFamily: FONT, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>แก้ไขปริมาณ</button>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <input type="text" value={editName} onChange={e => setEditName(e.target.value)} placeholder="ชื่อวัตถุดิบ" style={{ ...S.goldInput, fontWeight: 700 }} />
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                    <input type="number" value={editQty} onChange={e => setEditQty(e.target.value)} placeholder="จำนวน" style={S.goldInputStrong} inputMode="decimal" />
                    <select value={editUnit} onChange={e => setEditUnit(e.target.value)} style={{ ...S.goldInput, cursor: 'pointer' }}>
                      {UNIT_OPTS.map(u => <option key={u} value={u}>{u}</option>)}
                    </select>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                    <div>
                      <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 3 }}>แจ้งเตือนต่ำกว่า</div>
                      <input type="number" value={editMin} onChange={e => setEditMin(e.target.value)} style={S.goldInputStrong} inputMode="decimal" />
                    </div>
                    <div>
                      <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 3 }}>ราคาต่อหน่วย (฿)</div>
                      <input type="number" value={editPrice} onChange={e => setEditPrice(e.target.value)} style={S.goldInputStrong} inputMode="decimal" />
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 6 }}>
                    <button type="button" onClick={() => saveEdit(i)} style={S.goldSmallBtn}>บันทึก</button>
                    <button type="button" onClick={cancelEdit} style={S.ghostBtn}>ยกเลิก</button>
                  </div>
                  <button type="button" onClick={() => removeStock(i, item.name)} style={S.deleteBtnWide}>ลบวัตถุดิบนี้</button>
                </React.Fragment>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--text-1)' }}>น้ำจิ้ม</div>
      </div>

      <button type="button" onClick={() => setShowAddSauce(v => !v)} style={S.toggleBtn(showAddSauce)}>{showAddSauce ? '✕ ปิดฟอร์ม' : '+ เพิ่มรายการน้ำจิ้ม'}</button>

      {showAddSauce && (
        <div style={{ ...S.card, marginBottom: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)', marginBottom: 12 }}>เพิ่มรายการน้ำจิ้ม</div>
          <input type="text" value={newSauceName} onChange={e => setNewSauceName(e.target.value)} placeholder="เช่น น้ำจิ้มไก่, น้ำจิ้มแจ่ว..." style={{ ...S.input, marginBottom: 12 }} />
          <button type="button" onClick={addSauce} style={S.primaryBtn}>บันทึกน้ำจิ้ม</button>
        </div>
      )}

      {data.sauces.map((sa, i) => {
        const expanded = sauceExpandIdx === i;
        const editingName = editSauceIdx === i;
        const addingIng = addSauceIngIdx === i;
        const addingQty = addSauceQtyIdx === i;
        const maxPriceLabel = sa.maxPricePerBag > 0 ? `฿${f2(sa.maxPricePerBag)}` : 'ยังไม่ระบุ';
        return (
          <div key={sa.id} style={{ background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 16, overflow: 'hidden', marginBottom: 10 }}>
            {!editingName ? (
              <div onClick={() => setSauceExpandIdx(expanded ? -1 : i)} style={{ padding: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 50, height: 50, borderRadius: 13, background: 'var(--gold-dim)', border: '1px solid var(--gold-border)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <div style={{ fontSize: 17, fontWeight: 800, color: 'var(--gold)', lineHeight: 1 }}>{sa.stockQty}</div>
                  <div style={{ fontSize: 9, color: 'var(--gold)', fontWeight: 700, marginTop: 1 }}>ถุง</div>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-1)', marginBottom: 2 }}>{sa.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-2)' }}>{sa.ings.length} วัตถุดิบ / รอบ · ราคาต่อถุง {maxPriceLabel}</div>
                </div>
                <button type="button" onClick={(e) => startEditSauceName(i, sa.name, e)} style={{ width: 34, height: 34, borderRadius: 9, background: 'var(--input-bg)', border: '1px solid var(--card-border)', color: 'var(--text-2)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" /><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
                </button>
                <div style={{ color: 'var(--text-3)', fontSize: 14, flexShrink: 0 }}>{expanded ? '▲' : '▼'}</div>
              </div>
            ) : (
              <div style={{ padding: 14 }}>
                <input type="text" value={editSauceName} onChange={e => setEditSauceName(e.target.value)} style={{ ...S.goldInput, fontWeight: 700, marginBottom: 9 }} />
                <div style={{ display: 'flex', gap: 6 }}>
                  <button type="button" onClick={() => saveSauceName(i)} style={S.goldSmallBtn}>บันทึก</button>
                  <button type="button" onClick={cancelEditSauceName} style={S.ghostBtn}>ยกเลิก</button>
                </div>
                <button type="button" onClick={() => deleteSauce(i, sa.name)} style={{ ...S.deleteBtnWide, marginTop: 8 }}>ลบน้ำจิ้มนี้</button>
              </div>
            )}

            {expanded && (
              <div style={{ borderTop: '1px solid var(--divider)', padding: '12px 14px 14px' }}>
                <div style={S.sectionLabel}>วัตถุดิบที่ใช้ต่อรอบ</div>
                {sa.ings.map((ing, ii) => (
                  <div key={ii} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '7px 0', borderBottom: '1px solid var(--divider)', gap: 8 }}>
                    <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--text-1)', flex: 1 }}>{ing.name}</div>
                    <div style={{ fontSize: 13, color: 'var(--text-2)', flexShrink: 0 }}>{ing.qtyPerRound} {ing.unit} / รอบ</div>
                    <button type="button" onClick={() => deleteSIng(i, ii, ing.name)} style={S.deleteBtn}>ลบ</button>
                  </div>
                ))}

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-2)' }}>ราคาต่อถุง (สูงสุดที่เคยทำ)</div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: '#D03830' }}>{maxPriceLabel}</div>
                </div>

                {addingIng ? (
                  <div style={{ paddingTop: 10, display: 'flex', flexDirection: 'column', gap: 7 }}>
                    <select value={newSIngStock} onChange={e => setNewSIngStock(e.target.value)} style={{ ...S.goldInput, cursor: 'pointer' }}>
                      {data.stock.map(so => <option key={so.name} value={so.name}>{`${so.name} (${so.unit}${so.price ? ` · ฿${f2(so.price)}/${so.unit}` : ''})`}</option>)}
                    </select>
                    <input type="number" value={newSIngQty} onChange={e => setNewSIngQty(e.target.value)} placeholder={`ปริมาณต่อรอบ (${(data.stock.find(x => x.name === newSIngStock) || {}).unit || '-'})`} inputMode="decimal" style={S.goldInput} />
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button type="button" onClick={() => saveSIng(i)} style={S.goldSmallBtn}>บันทึก</button>
                      <button type="button" onClick={cancelAddSIng} style={S.ghostBtn}>ยกเลิก</button>
                    </div>
                  </div>
                ) : (
                  <button type="button" onClick={() => startAddSIng(i)} style={S.dashedBtn}>+ เพิ่มวัตถุดิบ</button>
                )}

                {addingQty ? (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--divider)', display: 'flex', flexDirection: 'column', gap: 7 }}>
                    <div style={S.sectionLabel}>ทำน้ำจิ้มรอบใหม่ — ได้กี่ถุง</div>
                    <input type="number" value={newSauceBags} onChange={e => setNewSauceBags(e.target.value)} placeholder="จำนวนถุงที่ทำรอบนี้" inputMode="decimal" style={S.goldInputStrong} />
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button type="button" onClick={() => saveSQty(i)} style={S.goldSmallBtn}>บันทึก (หักสต๊อก)</button>
                      <button type="button" onClick={cancelAddSQty} style={S.ghostBtn}>ยกเลิก</button>
                    </div>
                  </div>
                ) : (
                  <button type="button" onClick={() => startAddSQty(i)} style={{ width: '100%', padding: 11, marginTop: 12, border: 'none', borderRadius: 10, background: 'var(--gold)', color: '#111018', fontFamily: FONT, fontSize: 13, fontWeight: 800, cursor: 'pointer' }}>+ เพิ่มปริมาณน้ำจิ้ม (ถุง)</button>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════ Recipes ═══════════════════════════ */

function RecipesPage({ data, setData, notify }) {
  const [showAddRecipe, setShowAddRecipe] = useState(false);
  const [newRName, setNewRName] = useState(''); const [newRPrice, setNewRPrice] = useState('');
  const [expandIdx, setExpandIdx] = useState(-1);
  const [editRecipeIdx, setEditRecipeIdx] = useState(-1); const [editRName, setEditRName] = useState(''); const [editRPrice, setEditRPrice] = useState('');
  const [addIngIdx, setAddIngIdx] = useState(-1); const [newIngStock, setNewIngStock] = useState(''); const [newIngQty, setNewIngQty] = useState('');

  const recipeCostOf = r => r.ings.reduce((a, ing) => a + ing.cost, 0);

  const addRecipe = () => {
    if (!newRName.trim()) { notify('กรุณาระบุชื่อเมนู'); return; }
    const p = parseFloat(newRPrice);
    if (!newRPrice || isNaN(p) || p < 0) { notify('กรุณาระบุราคาที่ถูกต้อง'); return; }
    setData(prev => ({ recipes: [...prev.recipes, { name: newRName.trim(), price: p, ings: [] }] }));
    setShowAddRecipe(false); setNewRName(''); setNewRPrice('');
    notify(`เพิ่มเมนู "${newRName.trim()}" แล้ว ✓`);
  };
  const startEditMenu = (i, r, e) => { e.stopPropagation(); setEditRecipeIdx(i); setEditRName(r.name); setEditRPrice(String(r.price)); };
  const cancelEditMenu = () => setEditRecipeIdx(-1);
  const saveMenu = (i) => {
    if (!editRName.trim()) { notify('กรุณาระบุชื่อเมนู'); return; }
    const p = parseFloat(editRPrice);
    if (isNaN(p) || p < 0) { notify('กรุณาระบุราคาที่ถูกต้อง'); return; }
    setData(prev => ({ recipes: prev.recipes.map((r, idx) => idx === i ? { ...r, name: editRName.trim(), price: p } : r) }));
    setEditRecipeIdx(-1);
    notify(`อัปเดต "${editRName.trim()}" แล้ว ✓`);
  };
  const deleteMenu = (i, name) => {
    setData(prev => ({ recipes: prev.recipes.filter((_, idx) => idx !== i) }));
    setEditRecipeIdx(-1); setExpandIdx(-1);
    notify(`ลบเมนู "${name}" แล้ว`);
  };
  const startAddIng = (i) => { setAddIngIdx(i); setNewIngStock(data.stock[0] ? data.stock[0].name : ''); setNewIngQty(''); };
  const cancelAddIng = () => { setAddIngIdx(-1); setNewIngStock(''); setNewIngQty(''); };
  const deleteIng = (i, ii, name) => {
    setData(prev => ({ recipes: prev.recipes.map((r, idx) => idx === i ? { ...r, ings: r.ings.filter((_, x) => x !== ii) } : r) }));
    notify(`ลบ "${name}" แล้ว`);
  };
  const saveIng = (i) => {
    const q = parseFloat(newIngQty);
    if (!newIngQty || isNaN(q) || q <= 0) { notify('กรุณาระบุปริมาณที่ถูกต้อง'); return; }
    let name, qtyLabel, cost;
    if (newIngStock.startsWith('sauce:')) {
      const sauceName = newIngStock.slice(6);
      const sauce = data.sauces.find(x => x.name === sauceName);
      if (!sauce) { notify('กรุณาเลือกวัตถุดิบ'); return; }
      name = sauce.name; qtyLabel = `${q} ถุง`; cost = q * (sauce.maxPricePerBag || 0);
    } else {
      const stockItem = data.stock.find(x => x.name === newIngStock);
      if (!stockItem) { notify('กรุณาเลือกวัตถุดิบ'); return; }
      name = stockItem.name; qtyLabel = `${q} ${stockItem.unit}`; cost = q * (stockItem.price || 0);
    }
    setData(prev => ({ recipes: prev.recipes.map((r, idx) => idx === i ? { ...r, ings: [...r.ings, { name, qty: qtyLabel, cost }] } : r) }));
    cancelAddIng();
    notify(`เพิ่ม "${name}" แล้ว ✓`);
  };

  const ingredientOpts = [
    ...data.stock.map(st => ({ name: st.name, label: `${st.name} (${st.unit}${st.price ? ` · ฿${f2(st.price)}/${st.unit}` : ''})` })),
    ...data.sauces.map(sa => ({ name: `sauce:${sa.name}`, label: `${sa.name} — น้ำจิ้ม (ถุง${sa.maxPricePerBag ? ` · ฿${f2(sa.maxPricePerBag)}/ถุง` : ''})` })),
  ];
  const newIngUnit = newIngStock.startsWith('sauce:') ? 'ถุง' : (data.stock.find(x => x.name === newIngStock) || {}).unit || '-';
  const newIngCostPreview = f2((parseFloat(newIngQty) || 0) * (newIngStock.startsWith('sauce:')
    ? ((data.sauces.find(x => x.name === newIngStock.slice(6)) || {}).maxPricePerBag || 0)
    : ((data.stock.find(x => x.name === newIngStock) || {}).price || 0)));

  const avgMargin = data.recipes.length ? Math.round(data.recipes.reduce((a, r) => {
    const c = recipeCostOf(r); return a + (r.price > 0 ? (r.price - c) / r.price * 100 : 0);
  }, 0) / data.recipes.length) : 0;

  return (
    <div style={{ animation: 'fadeUp 0.22s ease' }}>
      <button type="button" onClick={() => setShowAddRecipe(v => !v)} style={S.toggleBtn(showAddRecipe)}>{showAddRecipe ? '✕ ปิดฟอร์ม' : '+ เพิ่มเมนูใหม่'}</button>

      {showAddRecipe && (
        <div style={{ ...S.card, marginBottom: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)', marginBottom: 13 }}>เพิ่มเมนูใหม่</div>
          <Field label="ชื่อเมนู"><input type="text" value={newRName} onChange={e => setNewRName(e.target.value)} placeholder="เช่น ข้าวจะกะข้าวหมูกรอบ..." style={S.input} /></Field>
          <div style={{ marginBottom: 14 }}>
            <label style={S.label}>ราคาขายต่อกล่อง (฿)</label>
            <input type="number" value={newRPrice} onChange={e => setNewRPrice(e.target.value)} placeholder="0" inputMode="decimal" style={S.inputStrong} />
          </div>
          <button type="button" onClick={addRecipe} style={S.primaryBtn}>บันทึกเมนู</button>
        </div>
      )}

      <div style={{ background: 'var(--gold-dim)', border: '1px solid var(--gold-border)', borderRadius: 14, padding: '13px 16px', marginBottom: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-2)' }}>กำไรเฉลี่ยทุกเมนู</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--gold)', lineHeight: 1.2 }}>{avgMargin}%</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 12, color: 'var(--text-3)' }}>{data.recipes.length} เมนู</div>
          <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>กดเพื่อดูรายละเอียด</div>
        </div>
      </div>

      {data.recipes.map((r, i) => {
        const cost = recipeCostOf(r);
        const margin = r.price - cost;
        const mPct = r.price > 0 ? Math.round((margin / r.price) * 100) : 0;
        const mc = mPct >= 40 ? '#1A9E5A' : mPct >= 25 ? '#E8920A' : '#D03830';
        const mb = mPct >= 40 ? 'rgba(26,158,90,0.12)' : mPct >= 25 ? 'rgba(232,146,10,0.12)' : 'rgba(208,56,48,0.12)';
        const expanded = expandIdx === i;
        const editingMenu = editRecipeIdx === i;
        const addingIng = addIngIdx === i;
        const dayQty = data.orders.reduce((a, o) => a + o.items.filter(it => it.menu === r.name).reduce((b, it) => b + it.qty, 0), 0);
        return (
          <div key={r.name + i} style={{ background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 16, overflow: 'hidden', marginBottom: 10 }}>
            {!editingMenu ? (
              <div onClick={() => setExpandIdx(expanded ? -1 : i)} style={{ padding: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 50, height: 50, borderRadius: 13, background: mb, border: `1px solid ${mc}30`, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <div style={{ fontSize: 15, fontWeight: 800, color: mc, lineHeight: 1 }}>{mPct}%</div>
                  <div style={{ fontSize: 9, color: mc, fontWeight: 700, marginTop: 1 }}>กำไร</div>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-1)', marginBottom: 2 }}>{r.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-2)' }}>ราคา ฿{r.price} · ต้นทุน ฿{f2(cost)}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>ขายวันนี้ {dayQty} กล่อง · ฿{fmt(dayQty * r.price)}</div>
                </div>
                <button type="button" onClick={(e) => startEditMenu(i, r, e)} style={{ width: 34, height: 34, borderRadius: 9, background: 'var(--input-bg)', border: '1px solid var(--card-border)', color: 'var(--text-2)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" /><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
                </button>
                <div style={{ color: 'var(--text-3)', fontSize: 14, flexShrink: 0 }}>{expanded ? '▲' : '▼'}</div>
              </div>
            ) : (
              <div style={{ padding: 14 }}>
                <div style={S.sectionLabel}>แก้ไขเมนู</div>
                <input type="text" value={editRName} onChange={e => setEditRName(e.target.value)} style={{ ...S.goldInput, fontWeight: 700, marginBottom: 9 }} />
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 3 }}>ราคาขายต่อกล่อง (฿)</div>
                  <input type="number" value={editRPrice} onChange={e => setEditRPrice(e.target.value)} style={S.goldInputStrong} inputMode="decimal" />
                </div>
                <div style={{ display: 'flex', gap: 6 }}>
                  <button type="button" onClick={() => saveMenu(i)} style={S.goldSmallBtn}>บันทึก</button>
                  <button type="button" onClick={cancelEditMenu} style={S.ghostBtn}>ยกเลิก</button>
                </div>
                <button type="button" onClick={() => deleteMenu(i, r.name)} style={{ ...S.deleteBtnWide, marginTop: 8 }}>ลบเมนูนี้</button>
              </div>
            )}

            {expanded && (
              <div style={{ borderTop: '1px solid var(--divider)', padding: '12px 14px 14px' }}>
                <div style={S.sectionLabel}>ส่วนผสมต่อกล่อง & ต้นทุนต่อกล่อง</div>
                {r.ings.map((ing, ii) => (
                  <div key={ii} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '7px 0', borderBottom: '1px solid var(--divider)', gap: 8 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--text-1)' }}>{ing.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--text-3)' }}>{ing.qty}</div>
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)', flexShrink: 0 }}>฿{f2(ing.cost)}</div>
                    <button type="button" onClick={() => deleteIng(i, ii, ing.name)} style={S.deleteBtn}>ลบ</button>
                  </div>
                ))}

                {addingIng ? (
                  <div style={{ paddingTop: 10, display: 'flex', flexDirection: 'column', gap: 7 }}>
                    <div>
                      <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 4 }}>เลือกวัตถุดิบจากสต๊อก</div>
                      <select value={newIngStock} onChange={e => setNewIngStock(e.target.value)} style={{ ...S.goldInput, cursor: 'pointer' }}>
                        {ingredientOpts.map(so => <option key={so.name} value={so.name}>{so.label}</option>)}
                      </select>
                    </div>
                    <div>
                      <div style={{ fontSize: 10, color: 'var(--text-3)', marginBottom: 4 }}>ปริมาณที่ใช้ต่อกล่อง ({newIngUnit})</div>
                      <input type="number" value={newIngQty} onChange={e => setNewIngQty(e.target.value)} placeholder="0" inputMode="decimal" style={S.goldInput} />
                    </div>
                    <div style={{ background: 'var(--gold-dim)', border: '1px solid var(--gold-border)', borderRadius: 10, padding: '9px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div style={{ fontSize: 12, color: 'var(--text-2)' }}>ต้นทุนต่อกล่อง</div>
                      <div style={{ fontSize: 15, fontWeight: 800, color: 'var(--gold)' }}>฿{newIngCostPreview}</div>
                    </div>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button type="button" onClick={() => saveIng(i)} style={S.goldSmallBtn}>บันทึกวัตถุดิบ</button>
                      <button type="button" onClick={cancelAddIng} style={S.ghostBtn}>ยกเลิก</button>
                    </div>
                  </div>
                ) : (
                  <button type="button" onClick={() => startAddIng(i)} style={S.dashedBtn}>+ เพิ่มวัตถุดิบ</button>
                )}

                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingTop: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-2)' }}>รวมต้นทุน</div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: '#D03830' }}>฿{f2(cost)}</div>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 6, paddingTop: 6, borderTop: '1px solid var(--divider)' }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text-2)' }}>กำไรต่อกล่อง</div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: '#1A9E5A' }}>฿{f2(margin)} ({mPct}%)</div>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════ Settings ═══════════════════════════ */

function SettingsPage({ data, setData, notify }) {
  const [vName, setVName] = useState(''); const [vPhone, setVPhone] = useState(''); const [vAddress, setVAddress] = useState('');

  const addVendor = () => {
    if (!vName.trim()) { notify('กรุณาระบุชื่อลูกค้า'); return; }
    const nv = { id: Date.now(), name: vName.trim(), phone: vPhone.trim(), address: vAddress.trim() };
    setData(prev => ({ vendors: [...prev.vendors, nv] }));
    setVName(''); setVPhone(''); setVAddress('');
    notify(`เพิ่ม "${nv.name}" แล้ว ✓`);
  };
  const deleteVendor = (id, name) => {
    setData(prev => ({ vendors: prev.vendors.filter(x => x.id !== id) }));
    notify(`ลบ "${name}" แล้ว`);
  };

  return (
    <div style={{ animation: 'fadeUp 0.22s ease' }}>
      <div style={{ ...S.card, marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-1)', marginBottom: 14 }}>เพิ่มข้อมูลลูกค้า</div>
        <Field label="ชื่อลูกค้า / ร้าน"><input type="text" value={vName} onChange={e => setVName(e.target.value)} placeholder="เช่น แม่สมหมาย..." style={S.input} /></Field>
        <Field label="เบอร์โทร"><input type="tel" value={vPhone} onChange={e => setVPhone(e.target.value)} placeholder="08x-xxx-xxxx" inputMode="tel" style={S.input} /></Field>
        <div style={{ marginBottom: 14 }}>
          <label style={S.label}>ที่อยู่ / จุดส่ง</label>
          <input type="text" value={vAddress} onChange={e => setVAddress(e.target.value)} placeholder="เช่น ตลาดสด แผงที่ 12..." style={S.input} />
        </div>
        <button type="button" onClick={addVendor} style={S.primaryBtn}>เพิ่มลูกค้า</button>
      </div>

      <div style={S.sectionLabel}>รายชื่อลูกค้า ({data.vendors.length})</div>
      {data.vendors.map(v => (
        <div key={v.id} style={{ background: 'var(--card-bg)', border: '1px solid var(--card-border)', borderRadius: 13, padding: '13px 14px', marginBottom: 9, display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 42, height: 42, borderRadius: 11, background: 'var(--gold-dim)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15, fontWeight: 800, color: 'var(--gold)', flexShrink: 0 }}>{v.name.charAt(0)}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--text-1)' }}>{v.name}</div>
            <div style={{ fontSize: 12, color: 'var(--text-2)', marginTop: 2 }}>{v.phone}</div>
            {!!v.address && <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 1 }}>{v.address}</div>}
          </div>
          <button type="button" onClick={() => deleteVendor(v.id, v.name)} style={{ ...S.deleteBtn, padding: '6px 10px' }}>ลบ</button>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════ App ═══════════════════════════ */

function App() {
  const [data, setDataRaw] = useState(loadPersisted);
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState('');
  const timerRef = useRef(null);

  const setData = (updater) => {
    setDataRaw(prev => {
      const patch = typeof updater === 'function' ? updater(prev) : updater;
      return patch ? { ...prev, ...patch } : prev;
    });
  };

  const notify = (msg) => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setToast(msg);
    timerRef.current = setTimeout(() => setToast(''), 2400);
  };

  useEffect(() => {
    const toSave = {};
    PERSIST_KEYS.forEach(k => { toSave[k] = data[k]; });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  }, [data]);

  const pageProps = { data, setData, notify };

  return (
    <div className="kg-app" data-theme={data.dark ? 'dark' : 'light'} style={{ height: '100vh', maxWidth: 430, margin: '0 auto', display: 'flex', flexDirection: 'column', background: 'var(--app-bg)', fontFamily: FONT, position: 'relative', boxShadow: '0 0 80px rgba(0,0,0,0.6)' }}>
      <Header dark={data.dark} onToggleDark={() => setData({ dark: !data.dark })} />

      <div style={{ padding: '14px 18px 6px', background: 'var(--app-bg)', flexShrink: 0 }}>
        <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: 'var(--text-1)', letterSpacing: -0.4 }}>{PAGE_TITLES[page]}</h1>
      </div>

      <div className="kg-scroll" style={{ flex: 1, overflowY: 'auto', padding: '10px 14px 86px' }}>
        {page === 'dashboard' && <DashboardPage {...pageProps} goToStock={() => setPage('stock')} />}
        {page === 'orders' && <OrdersPage {...pageProps} />}
        {page === 'production' && <ProductionPage {...pageProps} />}
        {page === 'stock' && <StockPage {...pageProps} />}
        {page === 'recipes' && <RecipesPage {...pageProps} />}
        {page === 'settings' && <SettingsPage {...pageProps} />}
      </div>

      <BottomNav page={page} onNavigate={setPage} />
      <Toast text={toast} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
